apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-copyparty
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
parameters:
  numberOfReplicas: "2"
  dataLocality: "disabled"
---
apiVersion: v1
kind: Namespace
metadata:
  name: copyparty
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: copyparty-files
  namespace: copyparty
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-copyparty
  resources:
    requests:
      storage: 100Gi
--- 
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: copyparty-config
  namespace: copyparty
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-copyparty
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: copyparty-config
  namespace: copyparty
data:
  copyparty.conf: |
    [global]
      p: 3923
      sftp: 2222
      sftp-pw
      hist: /cfg/hist
      e2dsa
      e2ts
      ansi
      qr-pin: 1
      md-hist: v
      chpw
      dotpart
      no-thumb 
      no-mtag-ff 
      no-robots 
      force-js
      unpost: 0 
      reflink 
      dav-auth 
      vague-403 
      nih 
      no-dav 
      no-logues 
      lo: cpp-%Y-%m%d-%H%M%S.txt.xz
      ls: **,*,ln,p,r
      nb
      logout: 24.0
      ah-alg: argon2
      stats
      localtime
      xff-hdr: x-real-ip
      xf-host: x-forwarded-host
      xf-proto: x-forwarded-proto
      xff-src: 10.42.0.0/16,127.0.0.0/16
      rproxy: -1
      doctitle: Lexih Was Here
      log-badxml
      lf-url: ^/[?&][lr]
      shr: /share  
      shr-adm: lexih
      dont-ban: any
    [accounts]
      lexih: default

    [/]
      /files/public/
      accs:
        r: *
        .rwmda: lexih
      flags:
        localtime,ui-nombar,ui-noacci,ui-nosrvi,ui-norepl,ui_nonav,ui_nocpla,ui-noctxb 
        sz: 0-2000m

    [/shared]
      /files/shared/
      accs:
        .rwd: *
        .rwmda: lexih
      flags:
        localtime,ui-nombar,ui-noacci,ui-nosrvi,ui-norepl,ui_nonav,ui_nocpla,ui-noctxb 
        textfiles: txt,nfo,diz,cue,readme,nd,html,js,javascript,jsx
        sz: 0-10m
        vmaxb: 10m
        chmod_d: 775
        chmod_f: 774

    [/private]
      /files/private/
      accs:
        .rwmda: lexih

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copyparty
  namespace: copyparty
  labels:
    app.kubernetes.io/name: copyparty
    app.kubernetes.io/version: "1.20.6"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: copyparty
  template:
    metadata:
      labels:
        app.kubernetes.io/name: copyparty
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"

      initContainers:
        - name: init-dirs
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /files/public /files/shared /files/private
              chown -R 1000:1000 /files
              chown -R 1000:1000 /cfg
          volumeMounts:
            - name: files
              mountPath: /files
            - name: config-data
              mountPath: /cfg
          securityContext:
            runAsUser: 0

      containers:
        - name: copyparty
          image: copyparty/im:1.20.6
          args:
            - --http-only
            - -c
            - /etc/copyparty/copyparty.conf
          ports:
            - name: http
              containerPort: 3923
              protocol: TCP
            - name: sftp
              containerPort: 2222
              protocol: TCP
          volumeMounts:
            - name: files
              mountPath: /files
            - name: config-data
              mountPath: /cfg
            - name: config-file
              mountPath: /etc/copyparty
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /?l
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /?r
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

      volumes:
        - name: files
          persistentVolumeClaim:
            claimName: copyparty-files
        - name: config-data
          persistentVolumeClaim:
            claimName: copyparty-config
        - name: config-file
          configMap:
            name: copyparty-config
---
apiVersion: v1
kind: Service
metadata:
  name: copyparty
  namespace: copyparty
  labels:
    app.kubernetes.io/name: copyparty
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: copyparty
  ports:
    - name: http
      port: 3923
      targetPort: http
      protocol: TCP
    - name: sftp
      port: 2222
      targetPort: sftp
      protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: copyparty-netpol
  namespace: copyparty
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: copyparty
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: apisix
            app.kubernetes.io/name: apisix
      toPorts:
        - ports:
            - port: "3923"
              protocol: TCP
            - port: "2222"
              protocol: TCP
  egress:
    - toEntities:
        - all
