        - ports:
            - port: "9180"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: apisix
            app.kubernetes.io/name: etcd
      toPorts:
        - ports:
            - port: "2379"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
