apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: apisix-pdb
  namespace: apisix
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apisix
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: apisix-etcd-pdb
  namespace: apisix
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: etcd
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: apisix-netpol
  namespace: apisix
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: apisix
  ingress:
    - fromEntities:
        - world
        - host
      toPorts:
        - ports:
            - port: "9080"
              protocol: TCP
            - port: "9443"
              protocol: TCP
            - port: "2222"
              protocol: TCP
            - port: "9180"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: apisix
      toPorts:
        - ports:
            - port: "9180"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: apisix
            app.kubernetes.io/name: etcd
      toPorts:
        - ports:
            - port: "2379"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
    - toEntities:
        - all
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: apisix-etcd-netpol
  namespace: apisix
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: etcd
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: apisix
            app.kubernetes.io/name: apisix
      toPorts:
        - ports:
            - port: "2379"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: apisix
            app.kubernetes.io/name: etcd
      toPorts:
        - ports:
            - port: "2380"
              protocol: TCP
            - port: "2379"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: apisix
            app.kubernetes.io/name: ingress-controller
      toPorts:
        - ports:
            - port: "2379"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: apisix
            app.kubernetes.io/name: etcd
      toPorts:
        - ports:
            - port: "2380"
              protocol: TCP
            - port: "2379"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: apisix-ingress-controller-netpol
  namespace: apisix
spec:
  endpointSelector:
    matchLabels:
